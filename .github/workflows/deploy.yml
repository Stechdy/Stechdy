name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/stechdy-backend
  
jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Stechdy_BE/backend
          file: ./Stechdy_BE/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max
      
      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Stechdy_FE/frontend
          file: ./Stechdy_FE/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/stechdy-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/stechdy-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/stechdy-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/stechdy-frontend:buildcache,mode=max
          
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create .env file from secret
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > Stechdy_BE/backend/.env
          
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts
          
      - name: Copy files to VPS
        run: |
          ssh root@${{ secrets.VPS_IP }} "mkdir -p /opt/stechdy"
          scp -r docker-compose.yml Stechdy_BE/ nginx/ scripts/ .env.example root@${{ secrets.VPS_IP }}:/opt/stechdy/
          
      - name: Deploy on VPS
        run: |
          ssh root@${{ secrets.VPS_IP }} << 'EOF'
            cd /opt/stechdy
            
            # Export environment variables
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            export DOCKER_IMAGE="${{ env.DOCKER_IMAGE }}"
            
            # Login to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Pull latest image
            docker pull ${DOCKER_IMAGE}:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/stechdy-frontend:latest
            
            # Stop old containers
            docker compose down
            
            # Create SSL certificate directory if not exists
            mkdir -p certbot/conf/live/stechdy.ai.vn certbot/www
            
            # Create dummy certificate if not exists (for first deployment)
            if [ ! -f certbot/conf/live/stechdy.ai.vn/fullchain.pem ]; then
              echo "Creating dummy SSL certificate for initial setup..."
              openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
                -keyout certbot/conf/live/stechdy.ai.vn/privkey.pem \
                -out certbot/conf/live/stechdy.ai.vn/fullchain.pem \
                -subj '/CN=stechdy.ai.vn' 2>/dev/null
            fi
            
            # Start services
            docker compose up -d
            
            # Wait for services to be healthy
            echo "Waiting for services to start..."
            sleep 30
            
            # Check service status
            docker compose ps
            
            # Show logs
            docker compose logs --tail=50
            
            # Clean up old images
            docker image prune -af --filter "until=24h"
          EOF
          
      - name: Verify deployment
        run: |
          ssh root@${{ secrets.VPS_IP }} << 'EOF'
            cd /opt/stechdy
            
            # Check if services are running
            if ! docker compose ps | grep -q "Up"; then
              echo "Error: Services are not running properly"
              docker compose logs
              exit 1
            fi
            
            echo "Deployment successful!"
          EOF
          
      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment to VPS successful"
          else
            echo "❌ Deployment to VPS failed"
            exit 1
          fi
